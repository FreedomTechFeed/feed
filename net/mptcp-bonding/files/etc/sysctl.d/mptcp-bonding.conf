# Enable Linux Multipath TCP (mainline since kernel 5.6; OpenWrt ≥22 ships it).
# The bonding client relies on the kernel splitting one ss-redir connection
# into per-WAN subflows toward the convergence-point VPS.

# Turn MPTCP on for newly created sockets that request it.
net.mptcp.enabled = 1

# 1 = fullmesh path manager (creates subflows for every address pair).
#     Best for bonding: maximises use of every upstream link.
# 0 = in-kernel endpoint-based PM (needs manual `ip mptcp endpoint` config).
net.mptcp.pm_type = 1

# Allow multiple subflows per connection (default 2). Raise once Crows-Nest
# exposes more than two upstream gateways.
net.mptcp.checksum_enabled = 0
