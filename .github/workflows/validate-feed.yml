name: Validate Feed

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"   # weekly: catch breakage from openwrt master / golang-package.mk churn

env:
  PKG_DIR: net/tollgate-wrt
  UPSTREAM: OpenTollGate/tollgate-module-basic-go

jobs:
  validate:
    name: Lint Makefile, verify hash & files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Makefile fields
        run: |
          set -e
          M="$PKG_DIR/Makefile"
          [ -f "$M" ] || { echo "FAIL: $M not found"; exit 1; }
          for field in PKG_NAME PKG_VERSION PKG_RELEASE PKG_SOURCE_URL PKG_HASH \
                       PKG_LICENSE GO_PKG GO_PKG_BUILD_PKG; do
            grep -q "^${field}:" "$M" || { echo "FAIL: missing $field"; exit 1; }
          done
          grep -q 'BuildPackage' "$M" || { echo "FAIL: missing BuildPackage eval"; exit 1; }

          # Upstream policy: REPLACES is not allowed in openwrt/packages.
          grep -q 'REPLACES' "$M" && { echo "FAIL: REPLACES not allowed upstream"; exit 1; }

          echo "Makefile lint passed."

      - name: Verify PKG_HASH against the source tarball
        run: |
          set -e
          M="$PKG_DIR/Makefile"
          EXPECTED=$(grep '^PKG_HASH:' "$M" | sed 's/^PKG_HASH:=//')
          PKG_VERSION=$(grep '^PKG_VERSION:' "$M" | sed 's/^PKG_VERSION:=//')
          [ "$EXPECTED" != "skip" ] || { echo "FAIL: PKG_HASH is 'skip'"; exit 1; }

          URL="https://codeload.github.com/${UPSTREAM}/tar.gz/v${PKG_VERSION}"
          echo "Fetching $URL"
          ACTUAL=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
          echo "expected=$EXPECTED"
          echo "actual  =$ACTUAL"
          [ "$EXPECTED" = "$ACTUAL" ] || { echo "FAIL: PKG_HASH mismatch"; exit 1; }

      - name: Verify every ./files/ path referenced by the Makefile exists
        run: |
          set -e
          M="$PKG_DIR/Makefile"
          # Pull out ./files/... tokens, strip a trailing glob '*' or cp '/.' suffix.
          grep -oP '\./files/\S+' "$M" \
            | sed -e 's/\*$//' -e 's#/\.$##' \
            | sort -u \
            | while IFS= read -r ref; do
                [ -e "$PKG_DIR/$ref" ] || { echo "FAIL: Makefile references $ref but $PKG_DIR/$ref is missing"; exit 1; }
              done
          echo "All referenced files/ paths exist."

      - name: Verify the critical runtime files are vendored
        run: |
          set -e
          for f in \
            files/etc/init.d/tollgate-wrt \
            files/etc/config/firewall-tollgate \
            files/etc/uci-defaults/99-tollgate-setup \
            files/etc/uci-defaults/90-tollgate-captive-portal-symlink \
            files/etc/hotplug.d/iface/95-tollgate-restart \
            files/lib/upgrade/keep.d/tollgate; do
            [ -f "$PKG_DIR/$f" ] || { echo "FAIL: missing $f"; exit 1; }
          done
          echo "Critical files present."

  go-smoke:
    name: Go cross-compile (no SDK)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: amd64,                      goarm: "",  gomips: "" }
          - { goarch: arm64,                      goarm: "",  gomips: "" }
          - { goarch: arm,                        goarm: "7", gomips: "" }
          - { goarch: mipsle,                     goarm: "",  gomips: softfloat }
          - { goarch: mips,                       goarm: "",  gomips: softfloat }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download pinned upstream source
        run: |
          set -e
          PKG_VERSION=$(grep '^PKG_VERSION:' "$PKG_DIR/Makefile" | sed 's/^PKG_VERSION:=//')
          URL="https://codeload.github.com/${UPSTREAM}/tar.gz/v${PKG_VERSION}"
          curl -fsSL "$URL" | tar -xz
          echo "TOLLGATE_SRC=$PWD/tollgate-module-basic-go-$PKG_VERSION/src" >> "$GITHUB_ENV"

      - name: Build service + CLI for ${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          set -e
          # Service: main module root at src/.
          (cd "$TOLLGATE_SRC" && go build -o /dev/null .)
          # CLI: separate module at src/cmd/tollgate-cli/.
          (cd "$TOLLGATE_SRC/cmd/tollgate-cli" && go build -o /dev/null .)

  build-sdk:
    name: SDK build (${{ matrix.target }})
    runs-on: ubuntu-latest
    # The authoritative proof that the package compiles inside the OpenWrt
    # build system via golang-package.mk (incl. the nested CLI module build).
    # Slow (~30-60 min/job: it bootstraps the Go toolchain). Runs on main
    # pushes, PRs, tags, weekly, and manual dispatch.
    # Phase 2 will add mediatek-filogic + ramips-mt7621; Phase 3 adds the
    # remaining arches for full parity with tollgate-module-basic-go CI.
    if: >-
      github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || startsWith(github.ref, 'refs/tags/')
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86-64,          desc: "host-runnable (amd64)" }
          - { target: mediatek-filogic, desc: "GL-MT6000 (aarch64)" }
          - { target: ramips-mt7621,    desc: "GL-MT3000 (mipsle)" }
    container:
      image: openwrt/sdk:${{ matrix.target }}-master
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Extract the OpenWrt SDK
        # Snapshot SDK images (>=24.10) ship an empty /builder plus a
        # setup.sh; release images are pre-extracted. Run setup only when the
        # SDK isn't already present. See openwrt/docker README.
        shell: bash
        run: cd /builder && { [ -d ./scripts ] || ./setup.sh; }

      - name: Restore SDK build cache
        # Cache the built Go toolchain (golang/host) + build state so re-runs
        # skip the ~40 min Go bootstrap. run_id makes the key unique (always
        # re-saves); restore-keys prefix finds the previous run's cache for
        # this target. Note: 10 GB/repo cap — 3 arches may occasionally evict
        # (self-healing: one cold run, then re-cached).
        uses: actions/cache@v4
        with:
          path: |
            /builder/staging_dir
            /builder/build_dir
            /builder/dl
          key: sdkbuild-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            sdkbuild-${{ matrix.target }}-

      - name: Add this feed alongside the standard feeds
        shell: bash
        run: |
          set -e
          cd /builder
          cp feeds.conf.default feeds.conf
          # src-link so the SDK builds straight from this checkout.
          echo "src-link tollgate $GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update -a
          # Targeted install (not -a): -a pulls every feed package and exposes
          # current openwrt-master recursive-dependency breakage (luci,
          # strongswan, ...). golang1.26 is required because the `golang`
          # package is a dummy whose HOST_BUILD_DEPENDS is golang1.26/host
          # (the real toolchain). Bump 1.26 if GO_DEFAULT_VERSION changes.
          ./scripts/feeds install tollgate-wrt golang golang1.26 nodogsplash jq

      - name: Configure
        shell: bash
        run: |
          cd /builder
          # The SDK ships a bloated config (CONFIG_ALL/ALL_KMODS) that makes
          # builds compile every kmod and time out. Re-seed minimal: keep only
          # the target selection + our packages, build-all flags off. (Don't use
          # scripts/config -- in this image it's a directory, not the helper.)
          make defconfig
          {
            grep -E '^CONFIG_TARGET' .config 2>/dev/null
            printf '# CONFIG_ALL is not set\n# CONFIG_ALL_KMODS is not set\n# CONFIG_ALL_NONSHARED is not set\n'
            printf 'CONFIG_PACKAGE_tollgate-wrt=y\nCONFIG_PACKAGE_nodogsplash=y\nCONFIG_PACKAGE_jq=y\n'
          } > .config.min
          mv .config.min .config
          make defconfig
          echo "enabled packages (=y): $(grep -c '=y' .config)"

      - name: Build tollgate-wrt
        shell: bash
        run: |
          cd /builder
          make -j"$(nproc)" package/tollgate-wrt/compile V=s

      - name: Collect & show produced package(s)
        shell: bash
        run: |
          set -e
          cd /builder
          echo "=== produced package(s) ==="
          find bin -type f \( -name 'tollgate-wrt*.ipk' -o -name 'tollgate-wrt*.apk' \) -print -exec ls -lh {} \;
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          find bin -type f \( -name 'tollgate-wrt*.ipk' -o -name 'tollgate-wrt*.apk' \) \
            -exec cp {} "$GITHUB_WORKSPACE/artifacts/" \;
          echo "=== staged for upload ==="
          ls -lh "$GITHUB_WORKSPACE/artifacts/"

      - name: Upload package artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: tollgate-wrt-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

      - name: Run binary smoke test
        # Only x86-64 produces a host-runnable binary; the GitHub runner is
        # x86-64, so we can find the compiled binary in the SDK build_dir
        # and actually execute it to prove it runs, not just compiles.
        if: matrix.target == 'x86-64'
        shell: bash
        run: |
          set -e
          echo "Searching SDK build_dir for compiled tollgate-wrt binary..."
          BINARY=$(find /builder/build_dir -name 'tollgate-wrt' -type f -perm -u+x | head -1)
          [ -n "$BINARY" ] || { echo "FAIL: tollgate-wrt binary not found in build_dir"; exit 1; }
          echo "Found binary: $BINARY"
          echo "=== version output ==="
          "$BINARY" version 2>/dev/null || "$BINARY" --version 2>/dev/null || {
            echo "WARN: version command failed, trying help"
            "$BINARY" --help 2>&1 | head -5
          }
          echo ""
          echo "=== CLI binary check ==="
          CLI=$(find /builder/build_dir -name 'tollgate' -o -name 'tollgate-cli' | grep -E '/usr/bin/' | head -1)
          if [ -n "$CLI" ]; then
            chmod +x "$CLI"
            "$CLI" version 2>/dev/null || "$CLI" --version 2>/dev/null || true
          fi
          echo ""
          echo "Binary smoke test passed."
