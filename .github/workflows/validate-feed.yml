name: Validate Feed

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"   # weekly: catch breakage from openwrt master / language-helper churn

jobs:
  validate:
    name: Lint Makefiles, verify hashes & files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint every net/*/Makefile
        run: |
          set -e
          FAIL=0
          for M in net/*/Makefile; do
            [ -f "$M" ] || continue
            PKG_DIR=$(dirname "$M")
            PKG_NAME=$(basename "$PKG_DIR")
            echo "::group::Lint $PKG_NAME"

            # Common required fields for all packages
            for field in PKG_NAME PKG_VERSION PKG_RELEASE PKG_LICENSE; do
              grep -q "^${field}:" "$M" || { echo "FAIL: $PKG_NAME missing $field"; FAIL=1; }
            done

            # BuildPackage eval required
            grep -q 'BuildPackage' "$M" || { echo "FAIL: $PKG_NAME missing BuildPackage eval"; FAIL=1; }

            # Upstream policy: REPLACES is not allowed in openwrt/packages.
            grep -q 'REPLACES' "$M" && { echo "FAIL: $PKG_NAME has REPLACES (not allowed upstream)"; FAIL=1; }

            # Language-specific required fields
            if grep -q 'golang-package.mk' "$M"; then
              for field in PKG_SOURCE_URL PKG_HASH GO_PKG GO_PKG_BUILD_PKG; do
                grep -q "^${field}:" "$M" || { echo "FAIL: $PKG_NAME (Go) missing $field"; FAIL=1; }
              done
            elif grep -q 'rust-package.mk' "$M"; then
              for field in PKG_SOURCE_URL PKG_BUILD_DEPENDS; do
                grep -q "^${field}:" "$M" || { echo "FAIL: $PKG_NAME (Rust) missing $field"; FAIL=1; }
              done
              grep -q 'rust/host' "$M" || { echo "FAIL: $PKG_NAME (Rust) missing rust/host dependency"; FAIL=1; }
            fi

            # Verify every ./files/ path referenced by the Makefile exists
            grep -oP '\./files/\S+' "$M" \
              | sed -e 's/\*$//' -e 's#/\.$##' \
              | sort -u \
              | while IFS= read -r ref; do
                  [ -e "$PKG_DIR/$ref" ] || { echo "FAIL: $PKG_NAME references $ref but file missing"; FAIL=1; }
                done

            echo "$PKG_NAME lint passed."
            echo "::endgroup::"
          done
          exit $FAIL

      - name: Verify tollgate-wrt PKG_HASH against source tarball
        env:
          UPSTREAM: OpenTollGate/tollgate-module-basic-go
        run: |
          set -e
          M="net/tollgate-wrt/Makefile"
          [ -f "$M" ] || { echo "SKIP: tollgate-wrt Makefile not found"; exit 0; }
          EXPECTED=$(grep '^PKG_HASH:' "$M" | sed 's/^PKG_HASH:=//')
          PKG_VERSION=$(grep '^PKG_VERSION:' "$M" | sed 's/^PKG_VERSION:=//')
          [ "$EXPECTED" != "skip" ] || { echo "FAIL: PKG_HASH is 'skip'"; exit 1; }
          URL="https://codeload.github.com/${UPSTREAM}/tar.gz/v${PKG_VERSION}"
          echo "Fetching $URL"
          ACTUAL=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
          echo "expected=$EXPECTED"
          echo "actual  =$ACTUAL"
          [ "$EXPECTED" = "$ACTUAL" ] || { echo "FAIL: PKG_HASH mismatch"; exit 1; }

      - name: Verify Rust PKG_MIRROR_HASH values are not 'skip'
        run: |
          set -e
          for M in net/*/Makefile; do
            grep -q 'rust-package.mk' "$M" || continue
            PKG_NAME=$(basename "$(dirname "$M")")
            HASH=$(grep '^PKG_MIRROR_HASH:' "$M" 2>/dev/null | sed 's/^PKG_MIRROR_HASH:=//')
            [ -n "$HASH" ] || { echo "FAIL: $PKG_NAME missing PKG_MIRROR_HASH"; exit 1; }
            [ "$HASH" != "skip" ] || { echo "FAIL: $PKG_NAME PKG_MIRROR_HASH is 'skip'"; exit 1; }
            echo "$PKG_NAME: PKG_MIRROR_HASH OK ($({ echo -n "$HASH" | wc -c; }) chars)"
          done

  go-smoke:
    name: Go cross-compile (no SDK)
    runs-on: ubuntu-latest
    env:
      PKG_DIR: net/tollgate-wrt
      UPSTREAM: OpenTollGate/tollgate-module-basic-go
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: amd64,                      goarm: "",  gomips: "" }
          - { goarch: arm64,                      goarm: "",  gomips: "" }
          - { goarch: mipsle,                     goarm: "",  gomips: softfloat }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download pinned upstream source
        run: |
          set -e
          PKG_VERSION=$(grep '^PKG_VERSION:' "$PKG_DIR/Makefile" | sed 's/^PKG_VERSION:=//')
          URL="https://codeload.github.com/${UPSTREAM}/tar.gz/v${PKG_VERSION}"
          curl -fsSL "$URL" | tar -xz
          echo "TOLLGATE_SRC=$PWD/tollgate-module-basic-go-$PKG_VERSION/src" >> "$GITHUB_ENV"

      - name: Build service + CLI for ${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          set -e
          # Service: main module root at src/.
          (cd "$TOLLGATE_SRC" && go build -o /dev/null .)
          # CLI: separate module at src/cmd/tollgate-cli/.
          (cd "$TOLLGATE_SRC/cmd/tollgate-cli" && go build -o /dev/null .)

  rust-smoke:
    name: Rust cross-compile ${{ matrix.package }} (no SDK)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
        package:
          - fips
          - tollgate-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Clone and build ${{ matrix.package }} for ${{ matrix.target }}
        env:
          # Override rust-toolchain.toml pin so we use the target we installed.
          RUSTUP_TOOLCHAIN: stable
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc
          AR_x86_64_unknown_linux_musl: ar
        run: |
          set -e
          PKG_DIR="net/${{ matrix.package }}"
          SOURCE_URL=$(grep '^PKG_SOURCE_URL:' "$PKG_DIR/Makefile" | sed 's/^PKG_SOURCE_URL:=//' | sed 's/\.git$//')
          SOURCE_VERSION=$(grep '^PKG_SOURCE_VERSION:' "$PKG_DIR/Makefile" | sed 's/^PKG_SOURCE_VERSION:=//')

          echo "Cloning $SOURCE_URL at $SOURCE_VERSION"
          git clone "$SOURCE_URL" /tmp/src
          cd /tmp/src
          git checkout "$SOURCE_VERSION"

          echo "Installed targets:"
          rustup target list --installed

          case "${{ matrix.package }}" in
            fips)
              cargo build --release --target ${{ matrix.target }} \
                --bin fips --bin fipsctl --bin fipstop --bin fips-gateway
              ;;
            tollgate-rs)
              cargo build --release --target ${{ matrix.target }} \
                --package tollgate-net
              ;;
          esac
          echo "Cross-compile OK for ${{ matrix.package }}"

  build-sdk:
    name: SDK build (${{ matrix.target }})
    runs-on: ubuntu-latest
    # The authoritative proof that the package compiles inside the OpenWrt
    # build system via golang-package.mk (incl. the nested CLI module build).
    # Slow (~30-60 min/job: it bootstraps the Go toolchain). Runs on main
    # pushes, PRs, tags, weekly, and manual dispatch. The 3-target matrix
    # proves the real TollGate hardware arches alongside x86-64.
    if: >-
      github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || startsWith(github.ref, 'refs/tags/')
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Temporary: x86-64 only — get a fast first green + cached run, then
          # re-add mediatek-filogic (GL-MT6000) and ramips-mt7621 (GL-MT3000).
          - { target: x86-64, desc: "host-runnable (amd64)" }
    container:
      image: openwrt/sdk:${{ matrix.target }}-master
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Extract the OpenWrt SDK
        shell: bash
        run: cd /builder && { [ -d ./scripts ] || ./setup.sh; }

      - name: Restore SDK build cache
        uses: actions/cache@v4
        with:
          path: |
            /builder/staging_dir
            /builder/build_dir
            /builder/dl
          key: sdkbuild-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            sdkbuild-${{ matrix.target }}-

      - name: Add this feed alongside the standard feeds
        shell: bash
        run: |
          set -e
          cd /builder
          cp feeds.conf.default feeds.conf
          # src-link so the SDK builds straight from this checkout.
          echo "src-link tollgate $GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update -a
          # Targeted install (not -a): -a pulls every feed package and exposes
          # current openwrt-master recursive-dependency breakage (luci,
          # strongswan, ...). golang1.26 is required because the `golang`
          # package is a dummy whose HOST_BUILD_DEPENDS is golang1.26/host
          # (the real toolchain). Bump 1.26 if GO_DEFAULT_VERSION changes.
          ./scripts/feeds install tollgate-wrt golang golang1.26 nodogsplash jq

      - name: Configure
        shell: bash
        run: |
          cd /builder
          make defconfig
          {
            grep -E '^CONFIG_TARGET' .config 2>/dev/null
            printf '# CONFIG_ALL is not set\n# CONFIG_ALL_KMODS is not set\n# CONFIG_ALL_NONSHARED is not set\n'
            printf 'CONFIG_PACKAGE_tollgate-wrt=y\nCONFIG_PACKAGE_nodogsplash=y\nCONFIG_PACKAGE_jq=y\n'
          } > .config.min
          mv .config.min .config
          make defconfig
          echo "enabled packages (=y): $(grep -c '=y' .config)"

      - name: Build tollgate-wrt
        shell: bash
        run: |
          cd /builder
          make -j"$(nproc)" package/tollgate-wrt/compile V=s

      - name: Collect & show produced package(s)
        shell: bash
        run: |
          set -e
          cd /builder
          echo "=== produced package(s) ==="
          find bin -type f \( -name 'tollgate-wrt*.ipk' -o -name 'tollgate-wrt*.apk' \) -print -exec ls -lh {} \;
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          find bin -type f \( -name 'tollgate-wrt*.ipk' -o -name 'tollgate-wrt*.apk' \) \
            -exec cp {} "$GITHUB_WORKSPACE/artifacts/" \;
          echo "=== staged for upload ==="
          ls -lh "$GITHUB_WORKSPACE/artifacts/"

      - name: Upload package artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: tollgate-wrt-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
